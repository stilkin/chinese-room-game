schema: spec-driven

context: |
  Project: Pi-Ying — a mobile game where players play classic board games
  against an AI "clone" that learns from their own past games using case-based
  reasoning (no neural networks or minimax). The clone narrates every decision.
  First game is Connect Four, with Othello, Chess, and Go on the roadmap.

  Tech stack: Dart everywhere, Flutter for mobile and web, Dart Frog or Relic
  for backend, PostgreSQL for online storage, sqflite for local storage.

  Architecture: Dart pub workspace monorepo.
    - packages/game_engine/ — pure Dart library (no Flutter dependency) with
      board representation, rules, diffusion kernels, similarity search, move
      selection, clone brain, and narration.
    - apps/mobile/ — Flutter mobile app, depends on game_engine.
    - apps/web/ — Flutter Web frontend (phase 2), depends on game_engine.
    - server/ — Dart backend (phase 3), depends on game_engine.

  Core engine: boards are 2D Int8 arrays. Similarity is purely perceptual —
  diffusion kernels turn boards into influence maps, which are quantized to
  Int8 diffused images; matching is L1 distance over those images, with a
  per-game candidate prefilter (e.g. ply-window for Connect Four) that
  widens adaptively when too few candidates pass. Diffusion kernels are
  game-specific (adding a new game means a rules module + diffusion kernel
  + prefilter + move scorer).

  Storage convention: per-game winner-POV. At game end every row of the
  finished game is aligned so the winner's pieces are +1 — player wins are
  stored as-is; bot wins are flipped via invertState; draws are stored as-is.
  At decision time the bot runs four queries (perspective × mirror) against
  the stored data, keeps outcome=+1 rows from the perspective-flipped queries
  (own past wins) and outcome=-1 rows from the unflipped queries (own past
  losses), and accumulates each candidate's diffused image (mirrored if from
  a mirror query) into a single signed heatmap with always-positive weights —
  the candidate image's natural sign carries the win/loss lesson. The legal
  move with the highest heatmap score is selected; if that score is ≤ 0, the
  brain falls back to a personality strategy.

  Build phases: (1) game engine + mobile Connect Four MVP, (2) diffusion +
  polish, (3) online backend + league + web, (4) more games. Validate fun
  before building infrastructure.

  Design spec: PROJECT.md

