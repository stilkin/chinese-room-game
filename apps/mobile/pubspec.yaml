name: pi_ying
description: Pi-Ying mobile app — Connect Four against a learning clone.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.5

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  game_engine:
    path: ../../packages/game_engine
  sqflite: ^2.4.0
  path: ^1.9.0
  path_provider: ^2.1.4
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  background_color_ios: "#233a8a"
  adaptive_icon_background: "#233a8a"
  adaptive_icon_foreground: "assets/icon/icon.png"
